<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carte PLT 2026 - Planning Complet</title>
    
    <!-- Polices Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        header: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        darkBg: '#1a1a1a',
                        cyanAccent: '#12b4c8',
                        yellowAccent: '#ffb703',
                    }
                }
            }
        }
    </script>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Styles Marqueurs Néo-brutalistes */
        .custom-div-icon { background: transparent; border: none; }
        .marker-pin {
            width: 24px; height: 24px;
            border-radius: 50% 50% 50% 0;
            position: absolute;
            transform: rotate(-45deg);
            left: 50%; top: 50%;
            margin: -12px 0 0 -12px;
            border: 2px solid #1a1a1a;
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
            display: flex; align-items: center; justify-content: center;
        }
        .marker-icon { transform: rotate(45deg); color: #1a1a1a; font-size: 11px; }

        /* Couleurs Thématiques */
        .theme-culture { background: #d946ef; }
        .theme-institution { background: #3b82f6; }
        .theme-entreprise { background: #10b981; }
        .theme-repas { background: #ffb703; }
        .theme-ralliement { background: #ef4444; }

        /* Popups Leaflet */
        .leaflet-popup-content-wrapper {
            background: #ffffff; color: #1a1a1a;
            border: 3px solid #1a1a1a; border-radius: 12px;
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
            padding: 0;
        }
        .leaflet-popup-tip-container { display: none; }
        .leaflet-popup-content { margin: 12px; width: 250px !important; }

        /* Ajustements UI */
        #map { height: 100%; width: 100%; z-index: 10; }
        .drawer-transition { transition: transform 0.3s ease-in-out; }

        /* Checkbox style */
        .custom-checkbox:checked + div { background-color: #1a1a1a; border-color: #1a1a1a; }
        .custom-checkbox:checked + div svg { display: block; }
        
        body.drawer-open { overflow: hidden; }

        /* Scrollbar pour le menu */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
    </style>
</head>

        ];

        // Persistence des horaires modifiés
        const savedTimes = JSON.parse(localStorage.getItem('plt_full_times') || '{}');

        function getPopupHTML(loc, index) {
            const theme = themes[loc.type];
            
            // Génération du bloc contact s'il existe (Icône Utilisateur au lieu de Téléphone)
            const contactHTML = loc.contact ? `
                <div class="flex items-start gap-2 mb-2 bg-gray-50 p-2 rounded border border-gray-200 shadow-sm">
                    <i class="fa-solid fa-user text-[10px] mt-0.5" style="color: ${theme.hex}"></i>
                    <span class="text-[10px] font-bold text-gray-700 leading-tight">${loc.contact}</span>
                </div>
            ` : '';

            // Affichage de l'adresse postale formattée
            const addressHTML = loc.address ? `
                <a href="https://maps.google.com/?q=${encodeURIComponent(loc.address)}" target="_blank" class="flex items-start gap-1.5 mb-2 text-[10px] text-gray-500 leading-tight hover:text-blue-500 transition-colors">
                    <i class="fa-solid fa-location-dot mt-0.5"></i>
                    <span>${loc.address}</span>
                </a>
            ` : '';

            return `
                <div class="font-body">
                    <span class="inline-block px-2 py-0.5 mb-2 text-[8px] font-black uppercase rounded border-2 border-black shadow-[1px_1px_0px_0px_black]" style="background-color: ${theme.hex}; color: ${loc.type==='repas'?'black':'white'}">
                        ${loc.type}
                    </span>
                    
                    <h3 class="text-sm font-bold font-header text-darkBg leading-tight mb-1">${loc.title}</h3>
                    
                    ${addressHTML}

                    <div class="flex items-center gap-2 mb-3">
                        <i class="fa-regular fa-clock text-cyanAccent text-[10px]"></i>
                        <span id="t-disp-${index}" onclick="editTime(${index})" class="bg-yellow-50 px-2 py-0.5 rounded border border-black font-black cursor-pointer text-[10px] shadow-[1px_1px_0px_0px_black] hover:bg-yellow-200 transition-colors">
                            ${loc.time}
                        </span>
                        <div id="t-edit-${index}" class="hidden flex gap-1">
                            <input type="text" id="t-in-${index}" value="${loc.time}" class="w-16 border border-black rounded p-0.5 text-[10px] font-bold">
                            <button onclick="saveTime(${index})" class="bg-emerald-500 text-white px-2 py-0.5 rounded border border-black text-[10px] shadow-[1px_1px_0px_0px_black] active:translate-y-0.5 active:shadow-none"><i class="fa-solid fa-check"></i></button>
                        </div>
                    </div>

                    ${contactHTML}

                    <div class="bg-white rounded-lg p-2 border-2 border-black text-[10px] font-bold leading-snug shadow-[2px_2px_0px_0px_rgba(0,0,0,0.1)]">
                        ${loc.legend}
                    </div>
                </div>
            `;
        }

        window.editTime = (i) => {
            document.getElementById(`t-disp-${i}`).classList.add('hidden');
            document.getElementById(`t-edit-${i}`).classList.remove('hidden');
            document.getElementById(`t-in-${i}`).focus();
        };

        window.saveTime = (i) => {
            const val = document.getElementById(`t-in-${i}`).value;
            locations[i].time = val;
            const data = JSON.parse(localStorage.getItem('plt_full_times') || '{}');
            data[i] = val;
            localStorage.setItem('plt_full_times', JSON.stringify(data));
            locations[i].marker.getPopup().setContent(getPopupHTML(locations[i], i));
        };

        // Création des marqueurs
        locations.forEach((loc, i) => {
            if(savedTimes[i]) loc.time = savedTimes[i];
            const theme = themes[loc.type];
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="marker-pin ${theme.css}"><i class="${theme.icon} marker-icon"></i></div>`,
                iconSize: [24, 24], iconAnchor: [12, 24], popupAnchor: [0, -24]
            });
            loc.marker = L.marker([loc.lat, loc.lng], { icon: icon }).bindPopup(getPopupHTML(loc, i));
            // Ajout initial
            loc.marker.addTo(map);
        });

        // Fonction de filtrage simple (Uniquement par Thèmes)
        function updateFilters() {
            const activeThemes = Array.from(document.querySelectorAll('.custom-checkbox:checked')).map(cb => cb.value);

            locations.forEach(loc => {
                if (activeThemes.includes(loc.type)) {
                    if (!map.hasLayer(loc.marker)) {
                        map.addLayer(loc.marker);
                    }
                } else {
                    if (map.hasLayer(loc.marker)) {
                        map.removeLayer(loc.marker);
                    }
                }
            });
        }

        // Écouteurs d'événements pour les filtres thématiques
        document.querySelectorAll('.filter-trigger').forEach(el => {
            el.addEventListener('change', updateFilters);
        });

        // Géolocalisation
        window.locateMe = () => { map.locate({setView: true, maxZoom: 15}); };
        map.on('locationfound', (e) => {
            L.circle(e.latlng, e.accuracy, { color: '#12b4c8', weight: 1, fillOpacity: 0.1 }).addTo(map);
        });

    </script>
</body>
</html>
