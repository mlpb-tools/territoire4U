<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte des Acteurs du Territoire - Sombre</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --rouge: #ff3366; 
    --vert: #8de045; 
    --bleu: #3bb2f6; 
    --jaune: #ffcb47;
    --fond-sombre: #1e1e24;
    --texte-clair: #f5f5f5;
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body { 
    font-family: 'DM Sans', sans-serif; 
    background: var(--fond-sombre);
    color: var(--texte-clair); 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
    overflow: hidden; 
  }

  /* En-tête mode sombre */
  .header {
    background: rgba(30, 30, 36, 0.95);
    padding: 16px 24px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    z-index: 1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #333;
  }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
  .header p { font-size: 13px; color: #aaa; margin-top: 4px; }

  #map-container { flex: 1; position: relative; width: 100%; }
  #map { width: 100%; height: 100%; background: #111; }

  /* Légende flottante sombre */
  .legend {
    position: absolute;
    bottom: 30px;
    right: 30px;
    background: rgba(30, 30, 36, 0.85);
    padding: 18px 24px;
    border-radius: 14px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    z-index: 1000;
    backdrop-filter: blur(8px);
    border: 1px solid #444;
  }
  .legend h3 { font-size: 14px; margin-bottom: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #fff; }
  .legend-item { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: 14px; font-weight: 500; color: #eee; }
  .legend-item:last-child { margin-bottom: 0; }
  .dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #222; box-shadow: 0 0 8px rgba(255,255,255,0.2); }

  /* Personnalisation des popups Leaflet (gardées claires pour le contraste) */
  .leaflet-popup-content-wrapper { background: #fff; border-radius: 12px; padding: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
  .leaflet-popup-tip { background: #fff; }
  .leaflet-popup-content { margin: 16px; color: #111; }
  .custom-popup .title { font-weight: 700; font-size: 16px; margin-bottom: 8px; line-height: 1.2; }
  .custom-popup .cat-badge { 
    display: inline-flex; align-items: center; gap: 6px; 
    font-size: 11px; font-weight: 700; padding: 4px 10px; 
    border-radius: 20px; text-transform: uppercase; 
    margin-bottom: 10px; border: 1px solid currentColor;
  }
  .custom-popup .note { font-size: 13.5px; color: #555; line-height: 1.5; font-weight: 500; }
</style>
</head>
<body>

  <div class="header">
    <div>
      <h1>Carte du Territoire</h1>
      <p>Mission Locale Pays Basque - Lieux ressources, compétences et réseau</p>
    </div>
  </div>

  <div id="map-container">
    <div id="map"></div>
    
    <div class="legend">
      <h3>Catégories</h3>
      <div class="legend-item"><div class="dot" style="background:var(--rouge)"></div> Réseau humain</div>
      <div class="legend-item"><div class="dot" style="background:var(--bleu)"></div> Compétences</div>
      <div class="legend-item"><div class="dot" style="background:var(--vert)"></div> Solutions pratiques</div>
      <div class="legend-item"><div class="dot" style="background:var(--jaune)"></div> Appuis de maintien</div>
    </div>
  </div>

<script>
// Données pré-chargées
const initialPins = [
  {name: "Lycée Jean Errecart", cat: "comp", note: "305 Rte des Écoles, 64120 Saint-Palais", lat: 43.328, lng: -1.033},
  {name: "Bilbaka", cat: "solutions", note: "95 Ainaren Karrika, 64120 Saint-Palais", lat: 43.330, lng: -1.035},
  {name: "Akiloukap", cat: "reseau", note: "18 Rue d'Espagne, 64220 Saint-Jean-Pied-de-Port", lat: 43.163, lng: -1.237},
  {name: "Les Récoltes du monde", cat: "solutions", note: "2 Rue de l'Église, 64220 Saint-Jean-Pied-de-Port", lat: 43.163, lng: -1.236},
  {name: "Grottes d'Urdax", cat: "appuis", note: "Barrio Leorlas, 31711 Urdazubi", lat: 43.266, lng: -1.503},
  {name: "Berritza", cat: "appuis", note: "4 Rue de l'Alava, 64130 Mauléon-Licharre", lat: 43.222, lng: -0.888},
  {name: "Philippe Mayté (Lecture Paysage)", cat: "comp", note: "Château Fort, 64130 Mauléon-Licharre", lat: 43.220, lng: -0.887},
  {name: "Goizeko Izarra", cat: "appuis", note: "Place Charles de Gaulle, 64220 Saint-Jean-Pied-de-Port", lat: 43.164, lng: -1.237},
  {name: "Trainière de Socoa", cat: "appuis", note: "Chemin des Blocs, 64500 Ciboure", lat: 43.385, lng: -1.667},
  {name: "Grottes de Zugarramurdi", cat: "appuis", note: "Beitikokarrika 18, 31710 Zugarramurdi", lat: 43.268, lng: -1.501},
  {name: "Odace", cat: "solutions", note: "14 Rue des Frères Barenne, 64130 Mauléon-Licharre", lat: 43.224, lng: -0.890},
  {name: "AZIA", cat: "reseau", note: "Maison du Patrimoine, 64130 Mauléon-Licharre", lat: 43.223, lng: -0.888},
  {name: "SPI AERO", cat: "comp", note: "Rue du Sécateur, 64130 Mauléon-Licharre", lat: 43.227, lng: -0.895},
  {name: "Ataria", cat: "comp", note: "Citadelle, 64220 Saint-Jean-Pied-de-Port", lat: 43.162, lng: -1.235},
  {name: "MSP Garazi", cat: "solutions", note: "11 Rue des Bergers, 64220 Saint-Jean-Pied-de-Port", lat: 43.165, lng: -1.239},
  {name: "Lokala", cat: "solutions", note: "630 Route de Bayonne, 64220 Ascarat", lat: 43.168, lng: -1.258},
  {name: "CPIE Littoral Basque", cat: "appuis", note: "Domaine d'Abbadia, 64700 Hendaye", lat: 43.376, lng: -1.750},
  {name: "ALDATU", cat: "comp", note: "Lotissement Larraidy, 64240 Hasparren", lat: 43.383, lng: -1.304},
  {name: "Régis Pochelu", cat: "appuis", note: "1005 Chemin de Xurruta, 64240 Hasparren", lat: 43.381, lng: -1.300},
  {name: "Château Garroa", cat: "appuis", note: "64240 Mendionde", lat: 43.344, lng: -1.298},
  {name: "Librairie Margot", cat: "solutions", note: "10 Allée Anne de Neubourg, 64250 Cambo-les-Bains", lat: 43.360, lng: -1.400},
  {name: "Imprimerie Mendiboure", cat: "comp", note: "8 Rue du Cardinal Lavigerie, 64250 Cambo-les-Bains", lat: 43.359, lng: -1.398},
  {name: "Groupe IZARRALDE", cat: "comp", note: "45 Allée Théodore Monod, 64210 Bidart", lat: 43.438, lng: -1.590},
  {name: "Cinéma L'Atalante", cat: "appuis", note: "3 Quai Amiral Antoine Sala, 64100 Bayonne", lat: 43.493, lng: -1.468},
  {name: "Grandola", cat: "solutions", note: "4 Rue des Tonneliers, 64100 Bayonne", lat: 43.491, lng: -1.474},
  {name: "Office de Tourisme de Bayonne", cat: "solutions", note: "25 Place de la Liberté, 64100 Bayonne", lat: 43.492, lng: -1.475},
  {name: "Mairie de Tarnos", cat: "solutions", note: "1 Boulevard de la Libération, 40220 Tarnos", lat: 43.540, lng: -1.463},
  {name: "Corbo Course", cat: "comp", note: "9B Avenue de la Légion Tchèque, 64100 Bayonne", lat: 43.497, lng: -1.470},
  {name: "Tube à essai / PTCE", cat: "comp", note: "23 Rue Hélène Boucher, 40220 Tarnos", lat: 43.535, lng: -1.465},
  {name: "Métrolocco", cat: "solutions", note: "23 Rue Hélène Boucher, 40220 Tarnos", lat: 43.535, lng: -1.465}
];

// Configuration des couleurs (légèrement éclaircies pour mieux ressortir sur fond noir)
const CAT_COLORS = { reseau: '#ff3366', comp: '#3bb2f6', solutions: '#8de045', appuis: '#ffcb47' };
const CAT_LABELS = { reseau: 'Réseau humain', comp: 'Compétences', solutions: 'Solutions pratiques', appuis: 'Appuis de maintien' };

const map = L.map('map');

// Utilisation du fond de carte sombre de CartoDB ("Dark Matter")
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap &copy; CARTO'
}).addTo(map);

function makePinIcon(color){
  return L.divIcon({
    className: '',
    html: '<div style="width:20px;height:20px;background:'+color+';border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #222;box-shadow:0 3px 10px rgba(0,0,0,0.8);"></div>',
    iconSize: [20, 20],
    iconAnchor: [10, 20],
    popupAnchor: [0, -22]
  });
}

const markersGroup = L.featureGroup().addTo(map);

initialPins.forEach(function(p){
  const color = CAT_COLORS[p.cat];
  const label = CAT_LABELS[p.cat];
  
  const popHtml = `
    <div class="custom-popup" style="min-width: 180px;">
      <div class="title">${p.name}</div>
      <div class="cat-badge" style="color: ${color}; background: ${color}20;">
        <div style="width:8px;height:8px;border-radius:50%;background:${color};"></div>
        ${label}
      </div>
      ${p.note ? `<div class="note">${p.note}</div>` : ''}
    </div>
  `;

  const marker = L.marker([p.lat, p.lng], { icon: makePinIcon(color) });
  marker.bindPopup(popHtml, { maxWidth: 280 });
  markersGroup.addLayer(marker);
});

// Centrage et zoom automatique sur tous les points
map.fitBounds(markersGroup.getBounds(), { padding: [50, 50] });

</script>
</body>
</html>
