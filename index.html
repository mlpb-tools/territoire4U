<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carte PLT 2026 - Planning Complet</title>
    
    <!-- Polices Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        header: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        darkBg: '#1a1a1a',
                        cyanAccent: '#12b4c8',
                        yellowAccent: '#ffb703',
                    }
                }
            }
        }
    </script>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Styles Marqueurs Néo-brutalistes */
        .custom-div-icon { background: transparent; border: none; }
        .marker-pin {
            width: 32px; height: 32px;
            border-radius: 50% 50% 50% 0;
            position: absolute;
            transform: rotate(-45deg);
            left: 50%; top: 50%;
            margin: -16px 0 0 -16px;
            border: 2px solid #1a1a1a;
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,1);
            display: flex; align-items: center; justify-content: center;
        }
        .marker-icon { transform: rotate(45deg); color: #1a1a1a; font-size: 14px; }

        /* Couleurs Thématiques */
        .theme-culture { background: #d946ef; }
        .theme-institution { background: #3b82f6; }
        .theme-entreprise { background: #10b981; }
        .theme-repas { background: #ffb703; }
        .theme-ralliement { background: #ef4444; }

        /* Popups Leaflet */
        .leaflet-popup-content-wrapper {
            background: #ffffff; color: #1a1a1a;
            border: 3px solid #1a1a1a; border-radius: 12px;
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
            padding: 0;
        }
        .leaflet-popup-tip-container { display: none; }
        .leaflet-popup-content { margin: 12px; width: 230px !important; }

        /* Ajustements UI */
        #map { height: 100%; width: 100%; z-index: 10; }
        .drawer-transition { transition: transform 0.3s ease-in-out; }

        /* Checkbox style */
        .custom-checkbox:checked + div { background-color: #1a1a1a; border-color: #1a1a1a; }
        .custom-checkbox:checked + div svg { display: block; }
        
        body.drawer-open { overflow: hidden; }
    </style>
</head>
<body class="bg-[#f8f9fa] h-screen overflow-hidden flex flex-col font-body">

    <!-- Header Compact -->
    <header class="bg-darkBg text-white px-4 py-2 border-b-2 border-black z-30 relative flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-cyanAccent w-8 h-8 rounded-full border-2 border-black flex items-center justify-center shadow-[1px_1px_0px_0px_white]">
                <i class="fa-solid fa-calendar-check text-black text-sm"></i>
            </div>
            <h1 class="text-sm md:text-base font-bold font-header tracking-tight">Planning <span class="text-yellowAccent">PLT 2026</span></h1>
        </div>
        <button onclick="toggleDrawer()" class="bg-white text-black px-3 py-1 rounded-full border-2 border-black font-bold text-[10px] shadow-[2px_2px_0px_0px_black] active:translate-y-0.5 active:shadow-none transition-all">
            <i class="fa-solid fa-sliders mr-1"></i> FILTRES
        </button>
    </header>

    <!-- Conteneur Principal -->
    <div class="flex-grow relative flex overflow-hidden">
        
        <!-- Panneau latéral / Tiroir (Drawer) -->
        <aside id="drawer" class="fixed inset-y-0 right-0 md:relative md:inset-auto w-[280px] bg-white z-[100] md:z-20 border-l-4 md:border-l-0 md:border-r-4 border-black transform translate-x-full md:translate-x-0 drawer-transition flex flex-col shadow-2xl md:shadow-none">
            
            <div class="flex items-center justify-between p-3 border-b-2 border-black bg-gray-50">
                <h2 class="font-header font-bold text-sm uppercase tracking-wider text-gray-700">Navigation</h2>
                <button onclick="toggleDrawer()" class="md:hidden w-8 h-8 bg-white border-2 border-black rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>

            <div class="p-4 flex flex-col gap-4 overflow-y-auto flex-grow">
                <!-- Filtres Compacts -->
                <div class="space-y-2">
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" id="check-ralliement" class="custom-checkbox hidden" checked>
                        <div class="w-5 h-5 border-2 border-black rounded mr-2 flex items-center justify-center bg-white transition-colors"><svg class="w-3 h-3 text-white hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg></div>
                        <span class="flex-grow py-1 px-3 border-2 border-black rounded-lg bg-red-500 font-bold text-white shadow-[2px_2px_0px_0px_black] text-[10px] uppercase tracking-tighter">Etapes & RDV</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" id="check-culture" class="custom-checkbox hidden" checked>
                        <div class="w-5 h-5 border-2 border-black rounded mr-2 flex items-center justify-center bg-white transition-colors"><svg class="w-3 h-3 text-white hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg></div>
                        <span class="flex-grow py-1 px-3 border-2 border-black rounded-lg bg-fuchsia-500 font-bold text-white shadow-[2px_2px_0px_0px_black] text-[10px] uppercase tracking-tighter">Culture</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" id="check-institution" class="custom-checkbox hidden" checked>
                        <div class="w-5 h-5 border-2 border-black rounded mr-2 flex items-center justify-center bg-white transition-colors"><svg class="w-3 h-3 text-white hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg></div>
                        <span class="flex-grow py-1 px-3 border-2 border-black rounded-lg bg-blue-500 font-bold text-white shadow-[2px_2px_0px_0px_black] text-[10px] uppercase tracking-tighter">Institutions</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" id="check-entreprise" class="custom-checkbox hidden" checked>
                        <div class="w-5 h-5 border-2 border-black rounded mr-2 flex items-center justify-center bg-white transition-colors"><svg class="w-3 h-3 text-white hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg></div>
                        <span class="flex-grow py-1 px-3 border-2 border-black rounded-lg bg-emerald-500 font-bold text-white shadow-[2px_2px_0px_0px_black] text-[10px] uppercase tracking-tighter">Entreprises</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" id="check-repas" class="custom-checkbox hidden" checked>
                        <div class="w-5 h-5 border-2 border-black rounded mr-2 flex items-center justify-center bg-white transition-colors"><svg class="w-3 h-3 text-white hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg></div>
                        <span class="flex-grow py-1 px-3 border-2 border-black rounded-lg bg-yellowAccent font-bold text-black shadow-[2px_2px_0px_0px_black] text-[10px] uppercase tracking-tighter">Repas</span>
                    </label>
                </div>

                <!-- Aide Contextuelle -->
                <div class="border-2 border-black rounded-xl p-3 bg-gray-50 text-[10px] font-bold text-gray-600 leading-tight">
                    <p class="uppercase text-gray-400 mb-2 border-b border-gray-200 pb-1 italic text-[9px]">Légende Etapes</p>
                    <div class="flex flex-col gap-2">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-clock text-cyanAccent"></i>
                            <span>Cliquez sur l'heure pour la modifier</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-info-circle text-red-500"></i>
                            <span>Date / Lieu / Destination</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="p-2 bg-darkBg text-white text-[8px] text-center font-bold uppercase tracking-widest border-t-2 border-black">
                Mission Locale Pays Basque - Mars 2026
            </div>
        </aside>

        <!-- Zone Carte -->
        <main class="flex-grow relative overflow-hidden">
            <div id="map"></div>
            
            <!-- Bouton flottant localiser -->
            <button onclick="locateMe()" class="absolute bottom-6 right-6 z-20 w-10 h-10 bg-white border-2 border-black rounded-full shadow-[3px_3px_0px_0px_black] flex items-center justify-center active:translate-y-0.5 active:shadow-none">
                <i class="fa-solid fa-crosshairs text-lg"></i>
            </button>
        </main>
    </div>

    <script>
        // UI Interaction
        function toggleDrawer() {
            const drawer = document.getElementById('drawer');
            drawer.classList.toggle('translate-x-full');
            document.body.classList.toggle('drawer-open');
        }

        // Configuration Carte
        const map = L.map('map', { zoomControl: false }).setView([43.34, -1.32], 10.5);
        
        L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
            attribution: '&copy; Google'
        }).addTo(map);

        const layers = {
            ralliement: L.layerGroup().addTo(map),
            culture: L.layerGroup().addTo(map),
            institution: L.layerGroup().addTo(map),
            entreprise: L.layerGroup().addTo(map),
            repas: L.layerGroup().addTo(map)
        };

        const themes = {
            ralliement: { css: 'theme-ralliement', icon: 'fa-solid fa-thumbtack', hex: '#ef4444' },
            culture: { css: 'theme-culture', icon: 'fa-solid fa-masks-theater', hex: '#d946ef' },
            institution: { css: 'theme-institution', icon: 'fa-solid fa-building-columns', hex: '#3b82f6' },
            entreprise: { css: 'theme-entreprise', icon: 'fa-solid fa-briefcase', hex: '#10b981' },
            repas: { css: 'theme-repas', icon: 'fa-solid fa-utensils', hex: '#ffb703' }
        };

        // Données consolidées (Planning 16 au 31 Mars 2026)
        const locations = [
            // REGROUPEMENTS PLENIERES
            { lat: 43.329, lng: -1.405, type: 'ralliement', title: 'Sanoki (Itxassou)', address: 'Salle Sanoki', legend: '16/03 / Itxassou / Lancement en plénière', time: '09:00 - 16:30' },
            { lat: 43.382, lng: -1.303, type: 'ralliement', title: 'Hasparren (Pôle Territorial)', address: 'Pôle Territorial', legend: '19/03 & 31/03 / Hasparren / Restitution portraits & finale', time: '09:00 - 17:00' },
            { lat: 43.395, lng: -1.458, type: 'ralliement', title: 'Ustaritz (Mairie Lapurdi)', address: 'Place du Labourd', legend: '30/03 / Ustaritz / Travail de restitution', time: '09:00 - 16:30' },
            
            // RALLIEMENTS TERRITOIRES (17, 23, 24, 25 Mars)
            { lat: 43.225, lng: -0.889, type: 'ralliement', title: 'MSP Mauléon', address: '14 Av. de Belzunce', legend: '17, 23, 24, 25 Mars / Mauléon / Visites Soule', time: '08:30' },
            { lat: 43.333, lng: -1.025, type: 'ralliement', title: 'MSP Saint-Palais', address: '1355 route d\'Esquilamborde', legend: '17, 23, 24, 25 Mars / St-Palais / Visites Amikuze', time: '08:30' },
            { lat: 43.167, lng: -1.229, type: 'ralliement', title: 'MSP Garazi', address: 'Route de St-Jean-Pied-de-Port', legend: '17, 23, 24, 25 Mars / Ispoure / Visites Garazi', time: '08:30' },
            { lat: 43.175, lng: -1.346, type: 'ralliement', title: 'Mairie de Baïgorry', address: '21 Gaineko karrika', legend: '17, 23, 24, 25 Mars / Baïgorry / Visites Garazi', time: '08:30' },
            { lat: 43.383, lng: -1.303, type: 'ralliement', title: 'Centre Elgar', address: '1 Place St-Jean, Hasparren', legend: '17, 23, 24, 25 Mars / Hasparren / Visites Errobi', time: '08:30' },
            { lat: 43.387, lng: -1.662, type: 'ralliement', title: 'ML St-Jean-de-Luz', address: '34 bd Victor Hugo', legend: '17, 23, 24, 25 Mars / St-Jean-de-Luz / Visites Sud PB', time: '08:30' },
            { lat: 43.358, lng: -1.774, type: 'ralliement', title: 'Mairie d\'Hendaye', address: 'Place de la République', legend: '17, 23, 24, 25 Mars / Hendaye / Visites Sud PB', time: '08:30' },
            { lat: 43.498, lng: -1.460, type: 'ralliement', title: 'ML ZUP Bayonne', address: '7 bis avenue de Jouandin', legend: '17, 23, 24, 25 Mars / Bayonne / Visites CBA', time: '08:30' },
            { lat: 43.492, lng: -1.509, type: 'ralliement', title: 'ML Anglet', address: '10 Rue du Pont de l\'Aveugle', legend: '17, 23, 24, 25 Mars / Anglet / Visites CBA', time: '08:30' },
            { lat: 43.540, lng: -1.460, type: 'ralliement', title: 'Mairie de Tarnos', address: '14 Bd Jacques Duclos', legend: '17, 23, 24, 25 Mars / Tarnos / Visites Seignanx', time: '08:30' },
            
            // VISITES (24-25 Mars)
            { lat: 43.166, lng: -1.233, type: 'culture', title: 'Rugby Nafarroa', address: 'Complexe sportif', legend: '24/03 / Visite Métiers Sport', time: '10:00' },
            { lat: 43.393, lng: -1.306, type: 'culture', title: 'Padel ELIZABERRIKO', address: 'Hasparren', legend: '24/03 / Visite Métiers Sport', time: '10:00' },
            { lat: 43.193, lng: -0.903, type: 'culture', title: 'Château Libarrenx', address: 'Gotein-Libarrenx', legend: '24/03 / Visite Culture/Hébergement', time: '14:30' },
            { lat: 43.396, lng: -1.683, type: 'culture', title: 'Trainière Sokoa', address: 'Port de Socoa', legend: '24/03 / Visite Culture/Sport', time: '14:30' },
            { lat: 43.541, lng: -1.458, type: 'culture', title: 'GRANDOLA Tarnos', address: 'Bd Jacques Duclos', legend: '24/03 / Visite Tiers-Lieu', time: '10:00' },
            
            { lat: 43.383, lng: -1.304, type: 'institution', title: 'ALDATU Hasparren', address: 'Rue Léon Larregain', legend: '24/03 / Visite Appui Entreprises', time: '14:30' },
            { lat: 43.376, lng: -1.748, type: 'institution', title: 'CPIE HENDAYE', address: 'Domaine d\'Abbadia', legend: '24/03 / Visite Environnement', time: '10:00' },
            { lat: 43.227, lng: -0.887, type: 'institution', title: 'ODACE Mauléon', address: 'Rue des Frères Barenne', legend: '24/03 / Visite Appui Entreprises', time: '10:00' },
            { lat: 43.163, lng: -1.237, type: 'institution', title: 'Office Tourisme', address: 'St-Jean-Pied-de-Port', legend: '25/03 / Visite Tourisme', time: '15:30' },
            
            { lat: 43.440, lng: -1.551, type: 'entreprise', title: 'IZARRALDE DATA', address: 'Bidart', legend: '24/03 / Visite Numérique', time: '10:00' },
            { lat: 43.495, lng: -1.474, type: 'entreprise', title: 'CFA IFRIA Bayonne', address: 'Av. Foch', legend: '25/03 / Visite Agroalimentaire', time: '10:00' },
            { lat: 43.359, lng: -1.399, type: 'entreprise', title: 'Imprimerie MENDIBOURE', address: 'Cambo', legend: '25/03 / Visite Industrie', time: '14:00' },
            { lat: 43.266, lng: -1.503, type: 'entreprise', title: 'BASERRIBERRI Urdax', address: 'Espagne', legend: '25/03 / Visite Restauration', time: '10:00' },

            // REPAS (24-25 Mars)
            { lat: 43.393, lng: -1.306, type: 'repas', title: 'Resto Etxebarria', address: 'Hasparren', legend: 'Repas du 24/03', time: '12:30' },
            { lat: 43.371, lng: -1.412, type: 'repas', title: 'ALDABURUA', address: 'Larressore', legend: 'Repas du 25/03', time: '12:30' },
            { lat: 43.222, lng: -0.889, type: 'repas', title: 'Euskalduna', address: 'Mauléon', legend: 'Repas du 24/03', time: '12:30' },
            { lat: 43.165, lng: -1.236, type: 'repas', title: 'Le Chat Perché', address: 'Garazi', legend: 'Repas du 24/03', time: '12:30' }
        ];

        // Persistence des horaires modifiés
        const savedTimes = JSON.parse(localStorage.getItem('plt_full_times') || '{}');

        function getPopupHTML(loc, index) {
            const theme = themes[loc.type];
            return `
                <div class="font-body">
                    <span class="inline-block px-2 py-0.5 mb-2 text-[8px] font-black uppercase rounded border-2 border-black" style="background-color: ${theme.hex}; color: ${loc.type==='repas'?'black':'white'}">
                        ${loc.type}
                    </span>
                    <h3 class="text-sm font-bold font-header text-darkBg leading-tight mb-1">${loc.title}</h3>
                    
                    <div class="flex items-center gap-2 mb-3">
                        <i class="fa-regular fa-clock text-cyanAccent text-[10px]"></i>
                        <span id="t-disp-${index}" onclick="editTime(${index})" class="bg-yellow-50 px-2 py-0.5 rounded border border-black font-black cursor-pointer text-[10px] shadow-[1px_1px_0px_0px_black]">
                            ${loc.time}
                        </span>
                        <div id="t-edit-${index}" class="hidden flex gap-1">
                            <input type="text" id="t-in-${index}" value="${loc.time}" class="w-16 border border-black rounded p-0.5 text-[10px] font-bold">
                            <button onclick="saveTime(${index})" class="bg-emerald-500 text-white p-0.5 rounded border border-black text-[8px]"><i class="fa-solid fa-check"></i></button>
                        </div>
                    </div>

                    <div class="bg-gray-100 rounded-lg p-2 border border-black text-[9px] font-bold leading-snug">
                        ${loc.legend}
                    </div>
                </div>
            `;
        }

        window.editTime = (i) => {
            document.getElementById(`t-disp-${i}`).classList.add('hidden');
            document.getElementById(`t-edit-${i}`).classList.remove('hidden');
            document.getElementById(`t-in-${i}`).focus();
        };

        window.saveTime = (i) => {
            const val = document.getElementById(`t-in-${i}`).value;
            locations[i].time = val;
            const data = JSON.parse(localStorage.getItem('plt_full_times') || '{}');
            data[i] = val;
            localStorage.setItem('plt_full_times', JSON.stringify(data));
            locations[i].marker.getPopup().setContent(getPopupHTML(locations[i], i));
        };

        locations.forEach((loc, i) => {
            if(savedTimes[i]) loc.time = savedTimes[i];
            const theme = themes[loc.type];
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="marker-pin ${theme.css}"><i class="${theme.icon} marker-icon"></i></div>`,
                iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32]
            });
            const marker = L.marker([loc.lat, loc.lng], { icon: icon }).bindPopup(getPopupHTML(loc, i));
            loc.marker = marker;
            layers[loc.type].addLayer(marker);
        });

        // Activation des filtres
        ['ralliement', 'culture', 'institution', 'entreprise', 'repas'].forEach(type => {
            const el = document.getElementById(`check-${type}`);
            if (el) {
                el.addEventListener('change', function() {
                    this.checked ? map.addLayer(layers[type]) : map.removeLayer(layers[type]);
                });
            }
        });

        // Géolocalisation
        window.locateMe = () => { map.locate({setView: true, maxZoom: 15}); };
        map.on('locationfound', (e) => {
            L.circle(e.latlng, e.accuracy, { color: '#12b4c8', weight: 1, fillOpacity: 0.1 }).addTo(map);
        });

    </script>
</body>
</html>
